<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#000000"/>

  <!-- DMR Monogram Recreation -->
  <g transform="translate(50, 100)">
    <!-- D - Left vertical and angled -->
    <polygon points="0,0 40,0 40,200 0,200" fill="white"/>
    <polygon points="45,0 70,0 70,60 45,85" fill="white"/>
    <polygon points="45,115 70,90 70,200 45,200" fill="white"/>

    <!-- M - Center with angular peak -->
    <polygon points="90,0 130,0 130,200 90,200" fill="white"/>
    <polygon points="135,80 150,60 165,80 165,200 135,200" fill="white"/>
    <polygon points="150,0 180,60 150,50" fill="white"/>
    <polygon points="150,50 180,60 150,0" fill="white"/>
    <polygon points="185,0 225,0 225,200 185,200" fill="white"/>
    <polygon points="185,80 215,60 185,60" fill="white"/>

    <!-- R - Right with angular break -->
    <polygon points="245,0 285,0 285,200 245,200" fill="white"/>
    <polygon points="290,0 315,0 315,60 290,85" fill="white"/>
    <polygon points="290,115 315,90 315,130 305,145" fill="white"/>
    <polygon points="290,155 305,145 315,160 315,200 290,200" fill="white"/>
  </g>
</svg>
